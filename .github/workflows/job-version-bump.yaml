name: Release Manager

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  Update_Version:
    name: 🚀 Update Changelog & Prep Release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: "Iv23ligVrrLzGPXe28dn"
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 📂 Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: 📝 Release Drafter (Anticipate Version)
        id: drafter
        uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔎 Detect releasable changes
        id: releasable
        env:
          BODY: ${{ steps.drafter.outputs.body }}
        run: |
          # On a push, skip the prep when release-drafter found no PR entries
          # (nothing releasable) so the manifest does not drift ahead. A manual
          # workflow_dispatch always runs the full lifecycle.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || printf '%s' "$BODY" | grep -qE '\(#[0-9]+\)'; then
            echo "yes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No releasable changes since the last release; skipping the prep commit."
            echo "yes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Release Version
        if: steps.releasable.outputs.yes == 'true'
        # Inlines what the template's `task update-version` does — keeps
        # this workflow self-contained without requiring a Taskfile.
        run: |
          npm version v${{ steps.drafter.outputs.resolved_version }} --no-git-tag-version --allow-same-version

      - name: 📤 Run Changelog Action
        if: steps.releasable.outputs.yes == 'true'
        env:
          LOG_LEVEL: debug
          LOG_FORMAT: text
          RELEASE_NOTES: >-
            ${{ steps.drafter.outputs.body }}
          RELEASE_VERSION: v${{ steps.drafter.outputs.resolved_version }}
        uses: bugs5382/changelog-updater-action@v0.3.2
        with:
          tag: ${{ env.RELEASE_VERSION }}
          notes: ${{ env.RELEASE_NOTES }}
          diff: 'true'

      - name: 📤 Commit and Push Version Update
        if: steps.releasable.outputs.yes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(pre-release): v${{ steps.drafter.outputs.resolved_version }} [skip ci]"
          # Commit as the owner, not github-actions[bot]. The push still goes
          # through the release App token (bypass actor) so the [skip ci] commit
          # is accepted on main; only the commit identity is the owner.
          commit_user_name: Bugs5382
          commit_user_email: 12115015+Bugs5382@users.noreply.github.com
          commit_author: Bugs5382 <12115015+Bugs5382@users.noreply.github.com>

      - name: 🏷️ Publish Release
        if: contains(github.event.head_commit.author.name, 'dependabot') || contains(github.event.head_commit.message, 'dependabot')
        uses: release-drafter/release-drafter@v7
        with:
          publish: true
          commitish: main
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
