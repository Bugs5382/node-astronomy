name: Release and Publish
on:
  workflow_dispatch:
  workflow_call:
  release:
    types:
      - released

permissions:
  contents: write
  actions: write
  checks: write
  id-token: write

jobs:
  Test:
    uses: ./.github/workflows/action-test.yaml

  Publish:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: ['Test']
    steps:
      - name: Create Directory
        run: mkdir -p ./lib

      - name: Download the build artifact
        uses: actions/download-artifact@v8
        with:
          name: cache
          path: ./

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org/'

      - name: Resolve npm dist-tag
        id: set-npm-tag
        # `latest` for stable releases (v1.2.3); pre-release identifiers
        # (alpha/beta/rc) get their own dist-tag so consumers don't grab
        # them by default.
        run: |
          TAG_NAME="${GITHUB_EVENT_RELEASE_TAG_NAME:-}"
          CLEAN="${TAG_NAME#v}"
          if [[ "$CLEAN" == *"alpha"* ]]; then
            NPM_TAG=alpha
          elif [[ "$CLEAN" == *"beta"* ]]; then
            NPM_TAG=beta
          elif [[ "$CLEAN" == *"rc"* ]]; then
            NPM_TAG=rc
          else
            NPM_TAG=latest
          fi
          echo "NPM_TAG=$NPM_TAG" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Publish to npm
        uses: JS-DevTools/npm-publish@v4
        with:
          provenance: true
          access: public
          ignore-scripts: true
          token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ steps.set-npm-tag.outputs.NPM_TAG }}

  Document:
    needs: ['Publish']
    uses: ./.github/workflows/action-docs.yaml
